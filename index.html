function render(f=''){

tweets.forEach((t,i)=>{

const d=document.createElement('div');
d.className='t';
const charCount = t.length;
const charColor = charCount <= 280 ? '#4ade80' : '#f87171';
d.innerHTML='<b>Tweet '+(i+1)+'</b> <span style="font-size:12px;color:'+charColor+'">'+charCount+'/280 chars</span><pre style="white-space:pre-wrap;margin-top:8px">'+t+'</pre>';
const b1=document.createElement('button'); b1.textContent='Copy'; b1.onclick=()=>navigator.clipboard.writeText(t);
const b2=document.createElement('button'); b2.textContent='Tweet'; b2.onclick=()=>window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(t));
d.appendChild(b1); d.appendChild(b2); c.appendChild(d);
});
}
render(); s.oninput=e=>render(e.target.value);
